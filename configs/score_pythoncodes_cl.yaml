dataset:
  name: flytech/python-codes-25k
  split: train

  # Полный датасет
  limit: null

model:
  name_or_path: Qwen/Qwen3-4B-Instruct-2507
  local_path: null

  dtype: float16
  device: cuda

curriculum:
  percentiles: [33, 66]
  batch_size: 4

  scorers:
    - length
    - ppl
    - ifd
    - lexical_cluster
    - semantic_cluster

  lexical_clusters: 10
  semantic_clusters: 10

runtime:
  offline: true

output:
  dataset_dir: datasets/pythoncodes_cl_scored
  parquet_path: outputs/curriculum/pythoncodes_cl_scored.parquet
  csv_path: outputs/curriculum/pythoncodes_cl_scored_preview.csv
  summary_path: outputs/curriculum/pythoncodes_cl_summary.json
