run:
  name: grpo_python_mbpp_execution
  seed: 42

model:
  base_model: /workspace/models/qwen3-4b-instruct-2507
  max_seq_length: 2048
  load_in_4bit: false
  fast_inference: true
  gpu_memory_utilization: 0.70
  local_files_only: true

lora:
  r: 32
  alpha: 32
  dropout: 0.0
  bias: none
  use_gradient_checkpointing: unsloth
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

dataset:
  disk_path: /workspace/datasets/mbpp_grpo_train
  parquet_path:
  split: train
  limit: 374
  seed: 42
  prompt_format: chat
  min_reference_chars: 0

reward:
  timeout: 3.0
  error_reward: -1.0
  no_tests_reward: -1.0
  length:
    min_chars: 8
    max_chars: 6000

training:
  output_dir: /workspace/outputs/rl/grpo_python_mbpp_execution
  logging_dir: /workspace/outputs/runs/rl/grpo_python_mbpp_execution

  # Real final Python-RL run.
  max_steps: 256
  learning_rate: 0.000002
  lr_scheduler_type: constant_with_warmup
  warmup_ratio: 0.03

  # num_generations=8 requires total train batch divisible by 8.
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 1
  num_generations: 8

  max_prompt_length: 1024
  max_completion_length: 512

  logging_steps: 1
  save_steps: 64
  save_total_limit: 2
  report_to: tensorboard

  beta: 0.0
  use_vllm: true
  vllm_gpu_memory_utilization: 0.70
  remove_unused_columns: false
  dataloader_num_workers: 0

vllm_runtime:
  enforce_eager: true
  disable_custom_all_reduce: true
  gpu_memory_utilization: 0.69
