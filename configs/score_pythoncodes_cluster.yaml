dataset:
  name: flytech/python-codes-25k
  split: train
  limit: null
  chunk_size: 5000

model:
  name_or_path: Qwen/Qwen3-14b
  local_path: null
  dtype: float16
  device: cuda

loss:
  batch_size: 4
  max_length: 2048

lexical:
  n_clusters: 10

semantic:
  batch_size: 8
  max_length: 1024
  n_clusters: 10
  layer_idx: null

llm_judge:
  enabled: true
  mode: forced_choice
  batch_size: 8
  max_length: 2048
  min_score: 1
  max_score: 5

curriculum:
  percentiles: [33, 66]

runtime:
  offline: true
  skip_existing: true

output:
  root: outputs/curriculum_array
  final_dataset_dir: datasets/pythoncodes_cl_scored
  final_parquet_path: outputs/curriculum_array/pythoncodes_cl_scored.parquet
  final_preview_csv_path: outputs/curriculum_array/pythoncodes_cl_scored_preview.csv
  final_summary_path: outputs/curriculum_array/pythoncodes_cl_summary.json
